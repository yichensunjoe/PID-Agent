services:
  pid-agent:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - pid-agent-data:/data
      # Optional company symbols:
      # - ./company-symbols:/symbols:ro
    environment:
      PID_AGENT_DATABASE_PATH: /data/pid-agent.db
      # PID_AGENT_SYMBOL_PATHS: /symbols
      # PID_AGENT_LLM_BASE_URL: http://host.docker.internal:11434/v1
      # PID_AGENT_LLM_MODEL: your-model
      # PID_AGENT_LLM_API_KEY: optional

volumes:
  pid-agent-data:
