name: Issue 43 source snapshot

on:
  push:
    branches:
      - agent/issue-43-kimi-temperature

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout main baseline
        uses: actions/checkout@v4
        with:
          ref: d22870f762bf7a6d3ab8829c4d5a6da73cbca0df
          fetch-depth: 1
      - name: Package source
        shell: bash
        run: |
          set -euo pipefail
          tar --exclude=.git --exclude=frontend/node_modules --exclude=frontend/dist -czf /tmp/issue43-source.tar.gz .
          sha256sum /tmp/issue43-source.tar.gz
      - name: Upload source
        uses: actions/upload-artifact@v4
        with:
          name: issue43-source
          path: /tmp/issue43-source.tar.gz
          retention-days: 1
          if-no-files-found: error
