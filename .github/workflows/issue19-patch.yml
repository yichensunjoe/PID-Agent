name: Issue 19 integration patch

on:
  push:
    branches:
      - agent/issue-19-persistent-provider-routing
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-19-persistent-provider-routing
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Apply strict patch
        shell: bash
        run: |
          set +e
          python scripts/issue19_patch.py > issue19-patch-error.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add issue19-patch-error.log
            git commit -m "debug: capture issue 19 patch failure"
            git push
            exit "$status"
          fi
      - name: Remove one-shot helpers
        run: rm scripts/issue19_patch.py .github/workflows/issue19-patch.yml issue19-patch-error.log 2>/dev/null || true
      - name: Commit production changes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "feat: persist agent runs, discover models, and straighten pipes"
          git push
