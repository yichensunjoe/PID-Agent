name: Issue 19 integration patch

on:
  push:
    branches:
      - agent/issue-19-persistent-provider-routing
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-19-persistent-provider-routing
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Disambiguate strict compiler replacement
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/issue19_patch.py')
          text = path.read_text(encoding='utf-8')
          helper_anchor = '''def replace_once(path: str, old: str, new: str) -> None:
              target = Path(path)
              text = target.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"expected one match in {path}, found {count}: {old[:100]!r}")
              target.write_text(text.replace(old, new, 1), encoding="utf-8")
          '''
          helper_replacement = helper_anchor + '''\n\ndef replace_last(path: str, old: str, new: str) -> None:
              target = Path(path)
              text = target.read_text(encoding="utf-8")
              count = text.count(old)
              if count < 1:
                  raise RuntimeError(f"expected at least one match in {path}: {old[:100]!r}")
              head, tail = text.rsplit(old, 1)
              target.write_text(head + new + tail, encoding="utf-8")
          '''
          if helper_anchor not in text:
              raise SystemExit('replace_once helper anchor not found')
          text = text.replace(helper_anchor, helper_replacement, 1)
          ambiguous = '''replace_once(
              "backend/agentcad/semantic_compiler_engine.py",
              "        operation: ConnectPortsOperation,\\n    ) -> list[Operation]:\\n",
              "        operation: ConnectPortsOperation,\\n        grid_size: float,\\n    ) -> list[Operation]:\\n",
          )'''
          resolved = ambiguous.replace('replace_once(', 'replace_last(', 1)
          if ambiguous not in text:
              raise SystemExit('ambiguous compiler replacement not found')
          path.write_text(text.replace(ambiguous, resolved, 1), encoding='utf-8')
          PY
      - name: Apply strict patch
        shell: bash
        run: |
          set +e
          python scripts/issue19_patch.py > issue19-patch-error.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add issue19-patch-error.log
            git commit -m "debug: capture issue 19 patch failure"
            git push
            exit "$status"
          fi
      - name: Remove one-shot helpers
        run: rm scripts/issue19_patch.py .github/workflows/issue19-patch.yml issue19-patch-error.log 2>/dev/null || true
      - name: Commit production changes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "feat: persist agent runs, discover models, and straighten pipes"
          git push
