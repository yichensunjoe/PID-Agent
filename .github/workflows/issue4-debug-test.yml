name: Issue 4 debug multi tap

on:
  push:
    branches: [agent/issue-4-instrument-tap]

permissions:
  contents: write

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-4-instrument-tap
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: sudo apt-get update && sudo apt-get install --yes libcairo2
      - run: python -m pip install -e ".[mcp,dev]"
      - name: Capture test output
        run: |
          set +e
          pytest -q backend/tests/test_semantic_multi_tap.py > /tmp/multi-tap.log 2>&1
          status=$?
          set -e
          {
            echo "exit_status=$status"
            cat /tmp/multi-tap.log
          } > reports/debug-multi-tap.log
      - name: Commit debug output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/debug-multi-tap.log
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "test: capture multi-tap failure output"
          git push
