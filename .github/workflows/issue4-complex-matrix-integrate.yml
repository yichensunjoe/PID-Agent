name: Issue 4 complex matrix integration

on:
  push:
    branches:
      - agent/issue-4-label-layout

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-4-label-layout
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python tools/issue4_add_complex_matrix.py
          python tools/issue4_fix_complex_check.py
      - run: |
          python -m pip install "ruff>=0.12,<1"
          ruff check --fix backend
      - run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/agentcad/model_acceptance.py
          git commit -m "fix: validate complex main route through split junctions"
          git push
