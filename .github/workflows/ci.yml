name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend · Python 3.11
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Cairo runtime
        run: |
          sudo apt-get update
          sudo apt-get install --yes libcairo2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project and test dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[mcp,dev]"

      - name: Ruff
        run: ruff check backend

      - name: Offline quality harness
        run: pid-agent quality-harness

      - name: Pytest
        run: pytest -q --junitxml=backend/test-results/pytest.xml

      - name: Upload pytest failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-failure-${{ github.run_id }}-${{ github.run_attempt }}
          path: backend/test-results/pytest.xml
          if-no-files-found: ignore
          retention-days: 7

  frontend:
    name: Frontend · Node 24
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Test connector routing
        run: npm test

      - name: Build
        run: npm run build

  playwright:
    name: Browser acceptance · Chromium
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: "true"
      PID_AGENT_LLM_API_KEY: ""
      PID_AGENT_LLM_BASE_URL: ""
      PID_AGENT_LLM_MODEL: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project
        run: python -m pip install --upgrade pip && python -m pip install -e ".[mcp,dev]"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Chromium, runtime dependencies and deterministic fonts
        working-directory: frontend
        run: |
          npx playwright install --with-deps chromium
          sudo apt-get install --yes fonts-noto-cjk

      - name: Build deterministic E2E frontend
        working-directory: frontend
        run: npm run build:e2e

      - name: Run local-mode browser acceptance
        working-directory: frontend
        run: npx playwright test

      - name: Run shared-mode security acceptance
        working-directory: frontend
        run: npx playwright test --config playwright.shared.config.ts

      - name: Verify browser artifacts contain no test credentials
        working-directory: frontend
        run: npm run test:e2e:secrets

      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            frontend/test-results/playwright
            frontend/test-results/playwright-report
            frontend/test-results/shared-playwright
            frontend/test-results/shared-playwright-report
            frontend/test-results/*.diagnostics.jsonl
          if-no-files-found: ignore
          retention-days: 7
