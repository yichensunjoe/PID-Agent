name: Issue 4 P1 cleanup

on:
  push:
    branches: [agent/issue-4-instrument-tap]

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-4-instrument-tap
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Fix prompt ordering
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("backend/agentcad/semantic_planner.py")
          content = path.read_text()
          old = (
              '        return (\n'
              '            "You are P&ID-Agent\'s semantic planning engine. Return JSON only with keys "\n'
              '            f"{task_mode}"\n'
              '            "\'explanation\' and \'transaction\'. Preserve unrelated elements. Use only real element IDs, "\n'
          )
          new = (
              '        return (\n'
              '            "You are P&ID-Agent\'s semantic planning engine. "\n'
              '            f"{task_mode}"\n'
              '            "Return JSON only with keys \'explanation\' and \'transaction\'. Preserve unrelated "\n'
              '            "elements. Use only real element IDs, "\n'
          )
          if new not in content:
              if old not in content:
                  raise SystemExit("prompt ordering marker not found")
              path.write_text(content.replace(old, new))
          PY
      - name: Ruff autofix
        run: |
          python -m pip install "ruff>=0.12,<1"
          ruff check --fix backend
      - name: Commit cleanup
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend
          git commit -m "style: clean semantic component integration"
          git push
