name: Issue 41 visual baseline refresh

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

concurrency:
  group: issue41-visual-baseline-refresh
  cancel-in-progress: true

jobs:
  refresh:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/issue-41-engineering-reports'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      CI: "true"
      PID_AGENT_LLM_API_KEY: ""
      PID_AGENT_LLM_BASE_URL: ""
      PID_AGENT_LLM_MODEL: ""
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/issue-41-engineering-reports
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project and deterministic fonts
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes libcairo2 fonts-noto-cjk
          python -m pip install --upgrade pip
          python -m pip install -e ".[mcp,dev]"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend and Chromium
        shell: bash
        working-directory: frontend
        run: |
          set -euo pipefail
          npm ci --no-audit --no-fund
          npx playwright install --with-deps chromium

      - name: Refresh visual baselines
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('frontend/src/styles.css')
          text = path.read_text(encoding='utf-8')
          old = 'grid-template-columns: repeat(4, minmax(0, 1fr));'
          new = 'grid-template-columns: repeat(5, minmax(0, 1fr));'
          if text.count(old) != 1:
              raise SystemExit('unexpected right-panel tab layout source')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
          cd frontend
          npm run build:e2e
          npx playwright test --update-snapshots
          cd ..
          rm -rf frontend/dist frontend/test-results frontend/playwright-report

      - name: Validate and commit intended visual changes
        shell: bash
        run: |
          set -euo pipefail
          git add -- frontend/src/styles.css frontend/e2e/visual.spec.ts-snapshots/*.png
          git diff --cached --name-only | tee /tmp/issue41-visual-staged.txt
          python - <<'PY'
          from pathlib import Path
          import subprocess

          snapshots = {
              'frontend/e2e/visual.spec.ts-snapshots/agent-ghost-preview.png',
              'frontend/e2e/visual.spec.ts-snapshots/blank-editor-dark.png',
              'frontend/e2e/visual.spec.ts-snapshots/blank-editor-light.png',
              'frontend/e2e/visual.spec.ts-snapshots/bulk-properties-mixed.png',
              'frontend/e2e/visual.spec.ts-snapshots/command-palette.png',
              'frontend/e2e/visual.spec.ts-snapshots/connector-route-anchors.png',
              'frontend/e2e/visual.spec.ts-snapshots/engineering-drawing.png',
              'frontend/e2e/visual.spec.ts-snapshots/locked-element-badges.png',
              'frontend/e2e/visual.spec.ts-snapshots/minimap-large-zones.png',
              'frontend/e2e/visual.spec.ts-snapshots/multi-selection-toolbar.png',
          }
          expected = snapshots | {'frontend/src/styles.css'}
          staged = set(subprocess.check_output(['git', 'diff', '--cached', '--name-only'], text=True).splitlines())
          if 'frontend/src/styles.css' not in staged:
              raise SystemExit('right-panel layout change is missing')
          if not staged <= expected:
              raise SystemExit(f'unexpected staged visual changes: {sorted(staged - expected)}')
          for snapshot in snapshots:
              path = Path(snapshot)
              if not path.is_file() or path.stat().st_size < 10_000:
                  raise SystemExit(f'invalid visual baseline: {snapshot}')
          print(f'validated staged visual files: {sorted(staged)}')
          PY
          git diff --cached --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "test: stabilize and refresh visual baselines"
          git push origin HEAD:agent/issue-41-engineering-reports

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: issue41-visual-refresh-diagnostics
          path: |
            /tmp/issue41-visual-staged.txt
            frontend/test-results
            frontend/playwright-report
          retention-days: 2
          if-no-files-found: ignore
