name: Issue 37 validated apply

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

concurrency:
  group: issue37-validated-apply
  cancel-in-progress: true

jobs:
  apply:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/issue-37-pdf-print-titleblock'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CI: "true"
      PID_AGENT_LLM_API_KEY: ""
      PID_AGENT_LLM_BASE_URL: ""
      PID_AGENT_LLM_MODEL: ""
      NPM_CONFIG_REGISTRY: "https://registry.npmjs.org"
      NPM_CONFIG_FETCH_RETRIES: "3"
      NPM_CONFIG_FETCH_RETRY_FACTOR: "2"
      NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: "5000"
      NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: "30000"
      NPM_CONFIG_FETCH_TIMEOUT: "120000"
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/issue-37-pdf-print-titleblock
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Verify public npm registry
        shell: bash
        run: >-
          npm view zustand@5.0.14 dist.integrity
          --registry=https://registry.npmjs.org
          --fetch-retries=1
          --fetch-timeout=30000

      - name: Repair validated transport suffix
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from hashlib import sha256
          from pathlib import Path

          path = Path('.github/issue37-payload-00.b64')
          payload = path.read_text(encoding='ascii').replace('\r', '').replace('\n', '')
          damaged_sha256 = '0f71f2717268b9d682236c24bbe4e9a0bd185965fe65c935ffec4007710a0b46'
          repaired_sha256 = '4532705227b278a852638281faec5a0be4bf8fd93e51c258f45a081cdd531a7b'
          if len(payload) != 16001 or sha256(payload.encode('ascii')).hexdigest() != damaged_sha256:
              raise SystemExit('unexpected issue37 transport segment')
          if payload[-1] != 'Y':
              raise SystemExit('unexpected issue37 transport suffix')
          payload = payload[:-1]
          if len(payload) != 16000 or sha256(payload.encode('ascii')).hexdigest() != repaired_sha256:
              raise SystemExit('issue37 transport repair failed')
          path.write_text(payload, encoding='ascii')
          PY

      - name: Validate, test, apply and clean payload
        shell: bash
        run: bash -x .github/issue37-apply.sh 2>&1 | tee /tmp/issue37-apply.log

      - name: Upload temporary apply diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: issue37-apply-diagnostics
          path: |
            /tmp/issue37-apply.log
            .github/issue37-payload-00.b64
            .github/issue37-payload-01.b64
            .github/issue37-payload-02.b64
          include-hidden-files: true
          retention-days: 1
