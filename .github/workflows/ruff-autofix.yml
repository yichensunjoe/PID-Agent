name: Ruff autofix

on:
  push:
    branches: [agent/issue-4-schema-repair]

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-4-schema-repair
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install "ruff>=0.12,<1"
      - run: ruff check --fix backend
      - name: Commit fixes
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend
          git commit -m "style: apply ruff fixes"
          git push
