name: Issue 45 source snapshot

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/issue-45-source-snapshot.yml

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Create deterministic source archive
        run: |
          set -euo pipefail
          git ls-files -z | LC_ALL=C sort -z | tar --null -T - --owner=0 --group=0 --numeric-owner --mtime='UTC 1970-01-01' -czf pid-agent-source.tgz
          sha256sum pid-agent-source.tgz | tee pid-agent-source.tgz.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: issue-45-source-snapshot
          path: |
            pid-agent-source.tgz
            pid-agent-source.tgz.sha256
          if-no-files-found: error
          retention-days: 1
