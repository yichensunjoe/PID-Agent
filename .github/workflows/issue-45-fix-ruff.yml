name: Issue 45 fix Ruff imports

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/issue-45-fix-ruff.yml
      - backend/agentcad/semantic_planner.py

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-45-shared-security
          fetch-depth: 1
          show-progress: false
      - name: Apply validated import fix
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("backend/agentcad/semantic_planner.py")
          text = path.read_text()
          if "    ProviderNetworkPolicyError,\n" not in text:
              old = "    ProviderConnectionError,\n    ProviderTimeoutError,\n)"
              new = "    ProviderConnectionError,\n    ProviderNetworkPolicyError,\n    ProviderTimeoutError,\n)"
              if text.count(old) != 1:
                  raise SystemExit("unexpected llm import block")
              text = text.replace(old, new)
          if "    ProviderURLPolicyError,\n" not in text:
              old = "from .provider_security import ProviderNetworkPolicy, provider_http_transport"
              new = "from .provider_security import (\n    ProviderNetworkPolicy,\n    ProviderURLPolicyError,\n    provider_http_transport,\n)"
              if text.count(old) != 1:
                  raise SystemExit("unexpected provider security import block")
              text = text.replace(old, new)
          path.write_text(text)
          PY
          git diff --check
          PYTHONDONTWRITEBYTECODE=1 python -m compileall -q backend/agentcad/semantic_planner.py
          if git diff --quiet; then
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add backend/agentcad/semantic_planner.py
          git commit -m 'fix: import provider policy errors in semantic planner'
          git push origin HEAD:agent/issue-45-shared-security
