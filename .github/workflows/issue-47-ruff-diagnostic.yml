name: Issue 47 Ruff diagnostic

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/issue-47-ruff-diagnostic.yml

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-47-sqlite-recovery
          fetch-depth: 1
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip && python -m pip install -e '.[mcp,dev]'
      - name: Apply Ruff's deterministic import fix
        run: |
          ruff check backend/agentcad/store.py --fix
          ruff check backend > /tmp/issue-47-ruff.log 2>&1
      - uses: actions/upload-artifact@v4
        with:
          name: issue-47-ruff-fixed-${{ github.run_id }}
          path: |
            backend/agentcad/store.py
            /tmp/issue-47-ruff.log
          if-no-files-found: error
          retention-days: 1
