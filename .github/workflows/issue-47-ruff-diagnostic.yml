name: Issue 47 Ruff diagnostic

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/issue-47-ruff-diagnostic.yml

permissions:
  contents: write

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-47-sqlite-recovery
          fetch-depth: 1
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip && python -m pip install -e '.[mcp,dev]'
      - name: Apply and publish Ruff import fix
        run: |
          set -euo pipefail
          ruff check backend/agentcad/store.py --fix
          ruff check backend
          if git diff --quiet; then
            exit 0
          fi
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add backend/agentcad/store.py
          git commit -m 'style: apply Ruff import ordering'
          git push origin HEAD:agent/issue-47-sqlite-recovery
