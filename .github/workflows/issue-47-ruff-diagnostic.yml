name: Issue 47 Ruff diagnostic

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/issue-47-ruff-diagnostic.yml
      - backend/agentcad/cli.py
      - backend/agentcad/database_recovery.py
      - backend/agentcad/store.py
      - backend/tests/test_database_recovery.py

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-47-sqlite-recovery
          fetch-depth: 1
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip && python -m pip install -e '.[mcp,dev]'
      - name: Capture Ruff output
        id: ruff
        run: |
          set +e
          ruff check backend > /tmp/issue-47-ruff.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: issue-47-ruff-${{ github.run_id }}
          path: /tmp/issue-47-ruff.log
          if-no-files-found: error
          retention-days: 1
      - if: steps.ruff.outputs.status != '0'
        run: exit 1
