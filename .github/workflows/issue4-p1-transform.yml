name: Issue 4 P1 integration edits

on:
  push:
    branches: [agent/issue-4-instrument-tap]

permissions:
  contents: write

jobs:
  edit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-4-instrument-tap
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Apply targeted integration edits
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace(path: str, old: str, new: str) -> None:
              target = Path(path)
              content = target.read_text()
              if new in content:
                  return
              if old not in content:
                  raise SystemExit(f"expected text not found in {path}: {old[:80]!r}")
              target.write_text(content.replace(old, new))

          replace(
              "backend/agentcad/api_semantic_agent.py",
              "from .agent_semantic import SemanticTransactionCompiler, analyze_transaction\n",
              "from .agent_semantic import analyze_transaction\nfrom .semantic_compiler import SemanticTransactionCompiler\n",
          )
          replace(
              "backend/agentcad/model_acceptance.py",
              "from .agent_semantic import SemanticTransactionCompiler\n",
              "from .semantic_compiler import SemanticTransactionCompiler\n",
          )
          replace(
              "backend/agentcad/mcp_server.py",
              "from .agent_semantic import SemanticTransactionCompiler\n",
              "from .semantic_compiler import SemanticTransactionCompiler\n",
          )

          planner = Path("backend/agentcad/semantic_planner.py")
          content = planner.read_text()
          content = content.replace(
              "    AgentTransactionAssessment,\n    SemanticAgentPlan,\n",
              "    AgentTransactionAssessment,\n    FullDiagramTransaction,\n    SemanticAgentPlan,\n",
          )
          content = content.replace(
              "        schema = SemanticTransaction.model_json_schema()\n",
              "        full_diagram = not document.elements\n"
              "        transaction_model = FullDiagramTransaction if full_diagram else SemanticTransaction\n"
              "        schema = transaction_model.model_json_schema()\n",
          )
          content = content.replace(
              "            system_prompt=self._system_prompt(schema, repair=repair),\n",
              "            system_prompt=self._system_prompt(\n"
              "                schema, repair=repair, full_diagram=full_diagram\n"
              "            ),\n",
          )
          content = content.replace(
              "            try:\n                plan = SemanticAgentPlan.model_validate(normalized)\n            except ValidationError as exc:\n",
              "            try:\n"
              "                plan = SemanticAgentPlan.model_validate(normalized)\n"
              "                if full_diagram:\n"
              "                    FullDiagramTransaction.model_validate(\n"
              "                        plan.transaction.model_dump(mode=\"python\")\n"
              "                    )\n"
              "            except ValidationError as exc:\n",
          )
          content = content.replace(
              "    def _system_prompt(self, schema: dict, *, repair: bool) -> str:\n",
              "    def _system_prompt(\n"
              "        self, schema: dict, *, repair: bool, full_diagram: bool\n"
              "    ) -> str:\n",
          )
          marker = "        return (\n            \"You are P&ID-Agent's semantic planning engine. Return JSON only with keys \"\n"
          replacement = (
              "        task_mode = (\n"
              "            \"This is an empty-document full-diagram task. Only use operations in the supplied \"\n"
              "            \"full-diagram schema. Never create a raw connector through add_element. Use \"\n"
              "            \"connect_ports for equipment-to-equipment pipes, with waypoints for explicit orthogonal \"\n"
              "            \"routing. Use instrument_tap to split a main connector and create a junction, root valve, \"\n"
              "            \"instrument and bound branch pipes. \"\n"
              "            if full_diagram\n"
              "            else \"This is a local-edit task on an existing drawing. \"\n"
              "        )\n"
              "        return (\n"
              "            \"You are P&ID-Agent's semantic planning engine. Return JSON only with keys \"\n"
              "            f\"{task_mode}\"\n"
          )
          if replacement not in content:
              if marker not in content:
                  raise SystemExit("semantic planner system prompt marker not found")
              content = content.replace(marker, replacement)
          content = content.replace(
              "            \"Use connect_ports to create a semantic pipe between two real ports. \"\n",
              "            \"Use connect_ports to create a semantic pipe between two real ports; use waypoints \"\n"
              "            \"instead of raw connector JSON when a specific orthogonal route is required. \"\n"
              "            \"Use instrument_tap for pressure, temperature or flow takeoffs from a main connector. \"\n",
          )
          planner.write_text(content)

          replace(
              "frontend/src/types.ts",
              '  | { op: "connect_ports"; connector_id: string; source_element_id: string; source_port_id: string; target_element_id: string; target_port_id: string; routing?: "orthogonal" | "direct"; process_tag?: string; medium?: string; nominal_diameter?: string; layer_id?: string | null; system_id?: string | null; style?: Partial<Style> | null; name?: string; metadata?: Record<string, unknown> };\n',
              '  | { op: "connect_ports"; connector_id: string; source_element_id: string; source_port_id: string; target_element_id: string; target_port_id: string; routing?: "orthogonal" | "direct"; waypoints?: Point[]; process_tag?: string; medium?: string; nominal_diameter?: string; layer_id?: string | null; system_id?: string | null; style?: Partial<Style> | null; name?: string; metadata?: Record<string, unknown> }\n'
              '  | { op: "instrument_tap"; main_connector_id: string; junction_point: Point; direction?: "up" | "down"; branch_length?: number; measurement: "pressure" | "temperature" | "flow"; instrument_label: string; instrument_symbol_key?: string | null; instrument_port_id?: string; root_valve_symbol_key?: string; root_valve_in_port_id?: string; root_valve_out_port_id?: string; root_valve_label?: string; junction_id: string; downstream_connector_id: string; root_valve_id: string; instrument_id: string; junction_to_valve_connector_id: string; valve_to_instrument_connector_id: string; layer_id?: string | null; system_id?: string | null; style?: Partial<Style> | null; metadata?: Record<string, unknown> };\n',
          )
          replace(
              "frontend/src/App.tsx",
              '    case "connect_ports": return `连接 ${operation.source_element_id}.${operation.source_port_id} → ${operation.target_element_id}.${operation.target_port_id}`;\n',
              '    case "connect_ports": return `连接 ${operation.source_element_id}.${operation.source_port_id} → ${operation.target_element_id}.${operation.target_port_id}${operation.waypoints?.length ? ` · ${operation.waypoints.length} 个折点` : ""}`;\n'
              '    case "instrument_tap": return `仪表测点 ${operation.instrument_label} · ${operation.main_connector_id} @ (${operation.junction_point.x}, ${operation.junction_point.y})`;\n',
          )
          PY
      - name: Commit edits
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend frontend
          git commit -m "feat: integrate full-diagram semantic compiler"
          git push
