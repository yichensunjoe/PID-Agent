name: Issue 31 apply validated patch

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Rebuild and verify patch
        id: prepare
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -d .issue31-payload ]; then
            echo "apply=false" >> "$GITHUB_OUTPUT"
            echo "No payload remains; nothing to apply."
            exit 0
          fi
          cat .issue31-payload/part-* | base64 --decode > /tmp/issue31.patch.xz
          echo "2716572c2571b5b6111593a9ddccb632b4b2e525320eadf3cd723ea17f86431f  /tmp/issue31.patch.xz" | sha256sum -c -
          xz -dc /tmp/issue31.patch.xz > /tmp/issue31.patch
          echo "apply=true" >> "$GITHUB_OUTPUT"
      - name: Check and apply patch
        if: steps.prepare.outputs.apply == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git apply --check /tmp/issue31.patch
          git apply /tmp/issue31.patch
          rm -rf .issue31-payload
      - name: Validate intended diff
        if: steps.prepare.outputs.apply == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git add -A
          git diff --cached --check
          expected=$(cat <<'EOF' | sort
          .issue31-payload/part-000
          .issue31-payload/part-001
          .issue31-payload/part-002
          .issue31-payload/part-003
          .issue31-payload/part-004
          .issue31-payload/part-005
          .issue31-payload/part-006
          .issue31-payload/part-007
          .issue31-payload/part-008
          .issue31-payload/part-009
          .issue31-payload/part-010
          .issue31-payload/part-011
          .issue31-payload/part-012
          .issue31-payload/part-013
          .issue31-payload/part-014
          .issue31-payload/part-015
          .issue31-payload/part-016
          .issue31-payload/part-017
          .issue31-payload/part-018
          .issue31-payload/part-019
          .issue31-payload/part-020
          .issue31-payload/part-021
          .issue31-payload/part-022
          backend/agentcad/service.py
          backend/tests/test_editor_groups_locks.py
          docs/groups-locks-selection-bulk-editing.md
          frontend/src/App.tsx
          frontend/src/editor/EditorCanvas.tsx
          frontend/src/editor/PropertyInspector.tsx
          frontend/src/editor/interaction.css
          frontend/src/editor/selectionEditing.ts
          frontend/src/editorExperience.ts
          frontend/src/store.ts
          frontend/tests/selectionEditing.test.ts
          EOF
          )
          actual=$(git diff --cached --name-only | sort)
          printf '%s\n' "$actual"
          test "$actual" = "$expected"
      - name: Commit functional changes
        if: steps.prepare.outputs.apply == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "feat: add grouping, locks and bulk editing"
      - name: Push feature branch
        if: steps.prepare.outputs.apply == 'true'
        run: git push origin HEAD:${{ github.head_ref }}
