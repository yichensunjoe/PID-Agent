name: Issue 4 debug complex diagram

on:
  push:
    branches:
      - agent/issue-4-label-layout

permissions:
  contents: write

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-4-label-layout
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: sudo apt-get update && sudo apt-get install --yes libcairo2
      - run: python -m pip install -e ".[mcp,dev]"
      - run: |
          set +e
          pytest -q backend/tests/test_complex_diagram_matrix.py > /tmp/complex.log 2>&1
          status=$?
          set -e
          {
            echo "exit_status=$status"
            cat /tmp/complex.log
          } > reports/debug-complex.log
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/debug-complex.log
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "test: capture complex diagram failure"
          git push
