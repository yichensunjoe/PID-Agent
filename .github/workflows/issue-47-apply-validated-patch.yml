name: Issue 47 apply validated patch

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/issue-47-apply-validated-patch.yml
      - .github/issue-47-apply.sh
      - .github/issue-47.patch.gz.b64.*

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-47-sqlite-recovery
          fetch-depth: 1
          show-progress: false

      - name: Validate and apply patch
        id: apply
        run: |
          set +e
          if [ -f .github/issue-47-apply.sh ]; then
            bash .github/issue-47-apply.sh > /tmp/issue-47-apply.log 2>&1
            status=$?
          else
            echo 'Validated patch already applied; no action required.' > /tmp/issue-47-apply.log
            status=0
          fi
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload apply log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-47-apply-log-${{ github.run_id }}
          path: /tmp/issue-47-apply.log
          if-no-files-found: error
          retention-days: 1

      - name: Upload staged chunk for diagnosis
        if: steps.apply.outputs.status != '0'
        uses: actions/upload-artifact@v4
        with:
          name: issue-47-staged-chunk-${{ github.run_id }}
          path: .github/issue-47.patch.gz.b64.02
          if-no-files-found: error
          retention-days: 1

      - name: Propagate apply failure
        if: steps.apply.outputs.status != '0'
        run: exit 1
