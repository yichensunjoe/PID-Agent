name: Issue 41 validated apply

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

concurrency:
  group: issue41-validated-apply
  cancel-in-progress: true

jobs:
  apply:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/issue-41-engineering-reports'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/issue-41-engineering-reports
          fetch-depth: 0
      - name: Validate and apply permanent files
        shell: bash
        run: bash -x .github/issue41-apply.sh 2>&1 | tee /tmp/issue41-apply.log
      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: issue41-apply-diagnostics
          path: |
            /tmp/issue41-apply.log
            .github/issue41-apply.sh
            .github/issue41-current-*.b64
          include-hidden-files: true
          retention-days: 1
