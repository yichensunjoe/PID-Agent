name: Issue 4 semantic compiler engine imports

on:
  push:
    branches: [agent/issue-4-instrument-tap]

permissions:
  contents: write

jobs:
  edit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-4-instrument-tap
      - name: Update imports
        run: |
          python - <<'PY'
          from pathlib import Path
          paths = [
              "backend/agentcad/api_semantic_agent.py",
              "backend/agentcad/mcp_server.py",
              "backend/agentcad/model_acceptance.py",
              "backend/tests/test_semantic_instrument_tap.py",
          ]
          for name in paths:
              path = Path(name)
              content = path.read_text()
              content = content.replace(
                  "from .semantic_compiler import SemanticTransactionCompiler",
                  "from .semantic_compiler_engine import SemanticTransactionCompiler",
              )
              content = content.replace(
                  "from agentcad.semantic_compiler import SemanticTransactionCompiler",
                  "from agentcad.semantic_compiler_engine import SemanticTransactionCompiler",
              )
              path.write_text(content)
          PY
      - name: Commit imports
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend
          git commit -m "fix: use hardened semantic compiler engine"
          git push
