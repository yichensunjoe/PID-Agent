name: Issue 23 apply validated payload

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Apply payload
        run: |
          set -euo pipefail
          cat .issue23-payload/part-* | base64 --decode > /tmp/issue23-changes.tgz
          tar -xzf /tmp/issue23-changes.tgz
          rm -rf .issue23-payload
      - name: Validate staged files
        run: |
          set -euo pipefail
          git add -A
          git diff --cached --check
          git diff --cached --name-only | sort
      - name: Commit functional changes
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -am "feat: add inline insertion and smart canvas controls"
          git add docs/inline-insertion-alignment-viewport.md frontend/src/editor/editorGeometry.ts frontend/tests/editorGeometry.test.ts
          git commit --amend --no-edit
      - name: Push feature branch
        run: git push origin HEAD:${{ github.head_ref }}
