name: Issue 41 source snapshot

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read

jobs:
  source:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/issue-41-engineering-reports'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Archive verified main source
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          main_sha="$(git rev-parse origin/main)"
          test "${main_sha}" = "a1a9099e9a68c8f6e950699ca20c68e2b15b9c8a"
          git archive --format=tar.gz --output=/tmp/issue41-source.tar.gz origin/main
          sha256sum /tmp/issue41-source.tar.gz > /tmp/issue41-source.sha256
          printf '%s\n' "${main_sha}" > /tmp/issue41-source.commit
      - name: Upload source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: issue41-source
          path: |
            /tmp/issue41-source.tar.gz
            /tmp/issue41-source.sha256
            /tmp/issue41-source.commit
          retention-days: 1
