name: Issue 45 apply validated patch

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/issue-45-apply-validated-patch.yml
      - .github/issue-45-apply.sh

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-45-shared-security
          fetch-depth: 1
          show-progress: false
      - name: Validate and apply patch
        run: |
          if ! bash .github/issue-45-apply.sh > /tmp/issue-45-apply.log 2>&1; then
            tail -n 100 /tmp/issue-45-apply.log
            exit 1
          fi
          tail -n 30 /tmp/issue-45-apply.log
