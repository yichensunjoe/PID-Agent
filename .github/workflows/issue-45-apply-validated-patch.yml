name: Issue 45 apply validated patch

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/issue-45-apply-validated-patch.yml
      - .github/issue-45-apply.sh

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-45-shared-security
          fetch-depth: 1
          show-progress: false
      - name: Validate and apply patch
        id: apply
        run: |
          set +e
          bash .github/issue-45-apply.sh > /tmp/issue-45-apply.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload apply log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-45-apply-log
          path: /tmp/issue-45-apply.log
          if-no-files-found: error
          retention-days: 1
      - name: Propagate apply failure
        if: steps.apply.outputs.status != '0'
        run: exit 1
