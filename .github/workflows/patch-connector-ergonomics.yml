name: Patch connector ergonomics

on:
  push:
    branches:
      - agent/issue-15-connector-ergonomics

permissions:
  contents: write

jobs:
  patch:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-15-connector-ergonomics
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python tools/patch_connector_ergonomics.py
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "feat: improve connector drawing and endpoint editing"
          git push origin HEAD:agent/issue-15-connector-ergonomics
