name: Issue 33 validated apply

on:
  pull_request:
    types: [reopened, synchronize]

permissions:
  contents: write

concurrency:
  group: issue33-validated-apply
  cancel-in-progress: true

jobs:
  apply:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/issue-33-browser-e2e-visual'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      PID_AGENT_LLM_API_KEY: ""
      PID_AGENT_LLM_BASE_URL: ""
      PID_AGENT_LLM_MODEL: ""
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/issue-33-browser-e2e-visual
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Validate, test, apply and self-clean
        shell: bash
        run: bash .github/issue33-apply.sh
