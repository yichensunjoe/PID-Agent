name: Issue 33 validated apply

on:
  pull_request:
    types: [reopened, synchronize]

permissions:
  contents: write

concurrency:
  group: issue33-validated-apply
  cancel-in-progress: true

jobs:
  apply:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/issue-33-browser-e2e-visual'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      PID_AGENT_LLM_API_KEY: ""
      PID_AGENT_LLM_BASE_URL: ""
      PID_AGENT_LLM_MODEL: ""
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/issue-33-browser-e2e-visual
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Repair validated transport segment
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from hashlib import sha256
          from pathlib import Path

          path = Path('.github/issue33-payload-03.b64')
          payload = path.read_text(encoding='ascii').replace('\r', '').replace('\n', '')
          damaged_sha256 = 'effa3c86999c8c360d35ab1cf7647a7377db0be554d2a0c8037b8a1bf5b8faca'
          repaired_sha256 = '89bbb0608d4128dd209de2cc072b1edc009b1b0814a8bb37378cfa10ce7181ec'
          if len(payload) != 14067 or sha256(payload.encode('ascii')).hexdigest() != damaged_sha256:
              raise SystemExit('unexpected issue33 transport segment')
          payload = payload[:10072] + 'n' + payload[10072:]
          if len(payload) != 14068 or sha256(payload.encode('ascii')).hexdigest() != repaired_sha256:
              raise SystemExit('issue33 transport segment repair failed')
          path.write_text(payload, encoding='ascii')
          PY

      - name: Validate, test, apply and self-clean
        shell: bash
        run: bash -x .github/issue33-apply.sh 2>&1 | tee /tmp/issue33-apply.log

      - name: Upload temporary apply diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: issue33-apply-diagnostics
          path: |
            /tmp/issue33-apply.log
            .github/issue33-payload-03.b64
          retention-days: 1
