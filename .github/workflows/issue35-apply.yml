name: Issue 35 validated apply

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

concurrency:
  group: issue35-validated-apply
  cancel-in-progress: true

jobs:
  apply:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/issue-35-project-json-import'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CI: "true"
      PID_AGENT_LLM_API_KEY: ""
      PID_AGENT_LLM_BASE_URL: ""
      PID_AGENT_LLM_MODEL: ""
      NPM_CONFIG_REGISTRY: "https://registry.npmjs.org"
      NPM_CONFIG_FETCH_RETRIES: "3"
      NPM_CONFIG_FETCH_RETRY_FACTOR: "2"
      NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: "5000"
      NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: "30000"
      NPM_CONFIG_FETCH_TIMEOUT: "120000"
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/issue-35-project-json-import
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Verify public npm registry
        shell: bash
        run: >-
          npm view zustand@5.0.14 dist.integrity
          --registry=https://registry.npmjs.org
          --fetch-retries=1
          --fetch-timeout=30000

      - name: Repair validated transport character
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from hashlib import sha256
          from pathlib import Path

          path = Path('.github/issue35-payload-01.b64')
          payload = path.read_text(encoding='ascii').replace('\r', '').replace('\n', '')
          damaged_sha256 = 'a853a32872cf2809109b80388cf4e0debf05d45e3a9d76e196e3d3be44e9c435'
          repaired_sha256 = '2a6082b5a98dc79e591febe71831bd99fd4c6f4e7f258ec862d9689249573263'
          if len(payload) != 16902 or sha256(payload.encode('ascii')).hexdigest() != damaged_sha256:
              raise SystemExit('unexpected issue35 transport segment')
          if payload[4918] != 'l':
              raise SystemExit('unexpected issue35 transport character')
          payload = payload[:4918] + 'p' + payload[4919:]
          if sha256(payload.encode('ascii')).hexdigest() != repaired_sha256:
              raise SystemExit('issue35 transport repair failed')
          path.write_text(payload, encoding='ascii')
          PY

      - name: Validate, test, apply and clean payload
        shell: bash
        run: bash -x .github/issue35-apply.sh 2>&1 | tee /tmp/issue35-apply.log

      - name: Upload temporary apply diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: issue35-apply-diagnostics
          path: |
            /tmp/issue35-apply.log
            .github/issue35-payload-01.b64
          include-hidden-files: true
          retention-days: 1
