name: Issue 43 validated apply

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: write

concurrency:
  group: issue43-validated-apply
  cancel-in-progress: true

jobs:
  apply:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/issue-43-kimi-temperature'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/issue-43-kimi-temperature
          fetch-depth: 0

      - name: Apply and validate staged commit
        shell: bash
        run: |
          set -euo pipefail
          symbol_before="$(sha256sum backend/agentcad/data/symbols.json | cut -d' ' -f1)"
          cat .github/issue43-linepatch-{00..06}.txt > /tmp/issue43.patch
          echo '87e9c9679838a5b5b9a070bd3855860272d56b69a2885d608dd08561e9479c4a  /tmp/issue43.patch' | sha256sum --check --strict
          git apply --check /tmp/issue43.patch
          git apply /tmp/issue43.patch
          test "$(sha256sum backend/agentcad/data/symbols.json | cut -d' ' -f1)" = "$symbol_before"

          rm -f .github/issue43-patch-*.txt .github/issue43-linepatch-*.txt .github/workflows/issue43-apply.yml
          git add -A
          git diff --cached --check
          python - <<'PY'
          import subprocess

          permanent = {
              'README.md',
              'backend/agentcad/llm.py',
              'backend/agentcad/provider_compat.py',
              'backend/agentcad/provider_discovery.py',
              'backend/agentcad/semantic_planner.py',
              'backend/tests/test_provider_compat.py',
              'docs/custom-model-api.md',
              'docs/provider-selection-and-agent-runs.md',
              'frontend/e2e/workspace.spec.ts',
              'frontend/src/App.tsx',
              'frontend/src/providerPresets.ts',
              'frontend/tests/providerPresets.test.ts',
          }
          temporary = {
              *(f'.github/issue43-patch-{index:02d}.txt' for index in range(6)),
              *(f'.github/issue43-linepatch-{index:02d}.txt' for index in range(7)),
              '.github/workflows/issue43-apply.yml',
          }
          changed = set(subprocess.check_output(
              ['git', 'diff', '--cached', '--name-only'], text=True
          ).splitlines())
          expected = permanent | temporary
          if changed != expected:
              raise SystemExit(f'issue 43 staged whitelist mismatch: {sorted(changed ^ expected)}')
          PY

      - name: Commit permanent changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'fix: support Kimi Coding provider constraints'
          git push origin HEAD:agent/issue-43-kimi-temperature
